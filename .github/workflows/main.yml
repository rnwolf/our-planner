name: Publish to PyPI

# Publishes ONLY when a GitHub release is published - creating the release
# is the deliberate act that ships to PyPI. (A push trigger on main used to
# run this on every push, failing whenever the version was unchanged.)
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/our-planner

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13.2"
          version: "0.6.11"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest tests

      - name: Build release distribution
        run: uv build

      - name: Publish to PyPI
        run: uv publish
